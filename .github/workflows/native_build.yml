name: Native Build

on:
  pull_request:
    branches: ["master", "release/*"]
  push:
    branches: ["master", "release/*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: rialto-ocdm

      - name: Install Dependencies
        run: |
          BRANCH="master"
          WORK_DIR=$(pwd)
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git ls-remote --exit-code --heads "https://github.com/rdkcentral/rialto.git" ${{ github.event.pull_request.head.ref }} > /dev/null
            if [ $? -eq 0 ]; then
              BRANCH="${{ github.event.pull_request.head.ref }}"
            else
              git ls-remote --exit-code --heads "https://github.com/rdkcentral/rialto.git" ${{ github.event.pull_request.base.ref}} > /dev/null
              if [ $? -eq 0 ]; then
                BRANCH="${{ github.event.pull_request.base.ref }}"
              else
                BRANCH="master"
              fi
            fi
          fi

          echo "Using branch: ${BRANCH}"
          echo "Work dir: ${WORK_DIR}"

          cd rialto-ocdm
          sudo sh -x install_dependencies_for_native_build.sh "${BRANCH}" "${WORK_DIR}" &> "${WORK_DIR}/output_file.txt"

      - name: Native build OCDM
        run: |
          WORK_DIR=$(pwd)
          cd rialto-ocdm
          sh -x build_native.sh "${WORK_DIR}" &>> "${WORK_DIR}/output_file.txt"

      - name: Report Build Status Success
        if: success()
        run: |
          echo "Build Succeeded!"
          exit 0

      - name: Upload Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: Output Logs
          path: |
            output_file.txt
